name: Assemble Packages

on:
  push:
    branches: [main]
    paths:
      - "sources/**"
      - "translations/**"

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate and assemble
        run: npm run prebuild

      - name: Commit assembled packages if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/
          if git diff --cached --quiet; then
            echo "No changes to assembled packages."
          else
            git commit -m "chore: assemble packages from latest sources and translations"
            git push
          fi
